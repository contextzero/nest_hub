# NEST - routing: / → nest-web (static), /api, /cli, /ws, SSE → nest-server
# Listens on port 80 inside the container; host mapping = WEB_PORT in .env (default 80).
# Public hostname (e.g. nest.example.com) and TLS are usually at ALB / host nginx — not hardcoded here.
# Docker embedded DNS (resolver) + variable en proxy_pass evita fallo si nest-web aún no resuelve al arrancar.
server {
    listen 80;
    listen [::]:80;
    server_name localhost _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 50M;
    set $nest_server nest-server;

    location /api/ {
        proxy_pass http://$nest_server:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /cli/ {
        proxy_pass http://$nest_server:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://$nest_server:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ready {
        proxy_pass http://$nest_server:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ws/ {
        proxy_pass http://$nest_server:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /api/events {
        proxy_pass http://$nest_server:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400;
    }

    location / {
        set $nest_web nest-web;
        proxy_pass http://$nest_web:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

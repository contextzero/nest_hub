# NEST - Server + Web from public images (blackbox: no source code, no DB access)
# Usage: ./setup.sh  (auto-generates secrets, pulls images, starts stack)
# Web app and API: http://localhost (port 80) or WEB_PORT from .env
# DB is internal-only; all access goes through the API via nginx.

services:
  db:
    image: postgres:16-alpine
    container_name: nest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nest-internal
    # No ports exposed: DB only reachable from nest-server via internal network.
    # For emergency admin: docker exec -it nest-db psql -U postgres -d nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  nest-server:
    image: matiasbaglieri/nest-server:latest
    container_name: nest-server
    restart: unless-stopped
    environment:
      - NEST_LISTEN_ADDR=0.0.0.0:8088
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nest}
      - CLI_API_TOKEN=${CLI_API_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nest-internal
    healthcheck:
      test: ["CMD", "/app/nest-server", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nest-web:
    image: matiasbaglieri/nest-web:latest
    container_name: nest-web
    restart: unless-stopped
    # La imagen tiene ENTRYPOINT /usr/sbin/nginx y CMD nginx -g ... → invoca "nginx" como flag erróneo
    entrypoint: ["/usr/sbin/nginx"]
    command: ["-g", "daemon off;"]
    networks:
      - nest-internal

  nginx:
    image: nginx:alpine
    container_name: nest-nginx
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nest-server:
        condition: service_started
      nest-web:
        condition: service_started
    networks:
      - nest-internal

volumes:
  pgdata:

networks:
  nest-internal:
    driver: bridge
